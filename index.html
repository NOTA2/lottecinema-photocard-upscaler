<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Lotte Cinema Photocard Upscaling</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="./favicon.png" />

    <style>
        :root {
            --bg: #050816;
            --bg-soft: #0f172a;
            --card-bg: #020617;
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.15);
            --text-main: #e5e7eb;
            --text-sub: #9ca3af;
            --border-soft: rgba(148, 163, 184, 0.3);
            --radius-lg: 18px;
            --radius-md: 999px;
            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.9);
            --transition: 180ms ease-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1d283a 0, #020617 50%, #000 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .app {
            width: 100%;
            max-width: 960px;
        }

        .card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 0.98));
            border-radius: 24px;
            padding: 24px 24px 20px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(148, 163, 184, 0.25);
            backdrop-filter: blur(14px);
        }

        @media (min-width: 768px) {
            .card {
                padding: 28px 28px 22px;
            }
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
        }

        .app-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: var(--radius-md);
            background: radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.26), rgba(15, 23, 42, 0.8));
            border: 1px solid rgba(56, 189, 248, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #e0f2fe;
        }

        .app-pill-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #22c55e;
            box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.22);
        }

        .target-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: rgba(15, 23, 42, 0.9);
            font-size: 11px;
            color: var(--text-sub);
            white-space: nowrap;
        }

        .target-pill b {
            color: #f97316;
            font-weight: 600;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 650;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 span.accent {
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .subtitle b {
            color: #e5e7eb;
            font-weight: 600;
        }

        .mode-switch {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .mode-button {
            border: 1px solid rgba(148, 163, 184, 0.45);
            background: rgba(15, 23, 42, 0.88);
            color: #cbd5e1;
            border-radius: var(--radius-md);
            padding: 9px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform var(--transition), border-color var(--transition), background var(--transition), color var(--transition), box-shadow var(--transition);
        }

        .mode-button:hover {
            transform: translateY(-1px);
            border-color: rgba(56, 189, 248, 0.7);
            color: #eff6ff;
        }

        .mode-button.is-active {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.24), rgba(168, 85, 247, 0.26));
            color: #f8fafc;
            border-color: rgba(56, 189, 248, 0.85);
            box-shadow: 0 10px 24px rgba(56, 189, 248, 0.16);
        }

        /* Controls */

        .controls {
            margin-top: 18px;
            padding: 0;
            border: none;
            background: transparent;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 640px) {
            .controls {
                flex-direction: column;
            }
        }

        .file-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .file-input-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            min-height: 118px;
            border-radius: var(--radius-lg);
            border: 1px dashed rgba(56, 189, 248, 0.5);
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), rgba(15, 23, 42, 0.95));
            padding: 24px 20px;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition), transform var(--transition), box-shadow var(--transition);
        }

        .file-input-wrapper:hover {
            border-color: var(--accent);
            background: rgba(15, 23, 42, 1);
            transform: translateY(-1px);
            box-shadow: 0 16px 35px rgba(56, 189, 248, 0.12);
        }

        .file-input-wrapper:focus-within {
            border-color: rgba(56, 189, 248, 0.9);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
        }

        .file-input-wrapper span.text-sub {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: #e5e7eb;
            text-align: center;
        }

        #fileInput {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            font-size: 0.8rem;
            color: #9ca3af;
            min-height: 1em;
            text-align: center;
        }

        .button-group {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
        }

        .btn {
            border-radius: var(--radius-md);
            border: none;
            font-size: 0.86rem;
            padding: 8px 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition), opacity var(--transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            color: #0b1120;
            box-shadow: 0 12px 25px rgba(56, 189, 248, 0.35);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 16px 35px rgba(56, 189, 248, 0.55);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: default;
            box-shadow: none;
        }

        .btn-secondary {
            background: rgba(15, 23, 42, 0.9);
            color: var(--text-sub);
            border: 1px solid var(--border-soft);
        }

        .btn-secondary:hover {
            background: rgba(15, 23, 42, 1);
            transform: translateY(-1px);
        }

        /* Layout bottom */

        .body-grid {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        @media (min-width: 800px) {
            .body-grid {
                grid-template-columns: 1.1fr 1fr;
            }
        }

        .panel {
            border-radius: var(--radius-lg);
            border: 1px solid rgba(31, 41, 55, 0.9);
            background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.95));
            padding: 12px 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.82rem;
            color: var(--text-sub);
        }

        .panel-header span.title {
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.76rem;
            color: #9ca3af;
        }

        .panel-header span.chip {
            padding: 3px 8px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(148, 163, 184, 0.5);
            font-size: 0.72rem;
            color: #9ca3af;
        }

        img.preview-img {
            max-width: 100%;
            max-height: 260px;
            height: auto;
            border-radius: 12px;
            border: 1px solid rgba(30, 64, 175, 0.5);
            object-fit: contain;
            background: black;
        }

        .preview-placeholder {
            font-size: 0.78rem;
            color: #4b5563;
            text-align: center;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            min-height: 180px;
            align-content: start;
        }

        @media (min-width: 760px) {
            .result-grid {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            }
        }

        .result-card {
            border-radius: 14px;
            border: 1px solid rgba(31, 41, 55, 0.9);
            background: rgba(2, 6, 23, 0.92);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-meta {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--text-sub);
        }

        .result-name {
            color: #e5e7eb;
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }

        .result-status {
            white-space: nowrap;
            padding: 3px 8px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(148, 163, 184, 0.4);
            font-size: 0.7rem;
        }

        .result-source {
            font-size: 0.74rem;
            color: #94a3b8;
        }

        .result-preview {
            border-radius: 14px;
            background: #020617;
            border: 1px solid rgba(15, 23, 42, 0.9);
            padding: 8px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .result-actions {
            display: flex;
            justify-content: flex-start;
        }

        .log {
            font-size: 0.75rem;
            color: #9ca3af;
            background: #020617;
            border-radius: 12px;
            padding: 8px 10px;
            border: 1px solid rgba(31, 41, 55, 0.9);
            min-height: 2.2em;
            white-space: pre-line;
        }

    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <header class="header">
            <div class="badge-row">
                <div class="app-pill">
                    <span class="app-pill-dot"></span>
                    <span>🎬 LOTTE CINEMA PHOTOCARD TOOL</span>
                </div>
                <div class="target-pill">
                    <span id="targetLabel">🎯 Target size</span>&nbsp; <b id="targetValue">≥ 250KB</b>
                </div>
            </div>
            <h1>
                <span class="accent">Photocard</span> Image Tool ✨
            </h1>
            <p class="subtitle" id="pageSubtitle">
                이미지를 업로드하면 <b>250KB 이상</b>의 새 이미지 파일로 만들어 줍니다.
            </p>
            <div class="mode-switch" id="modeSwitch">
                <button type="button" class="mode-button is-active" data-mode="allInOne">🪄 All-in-One</button>
                <button type="button" class="mode-button" data-mode="upscale">🚀 Auto Upscale</button>
                <button type="button" class="mode-button" data-mode="crop">✂️ 1537:2370 Crop</button>
            </div>
        </header>

        <!-- Controls -->
        <section class="controls">
            <div class="file-group">
                <label class="file-input-wrapper">
                    <span class="text-sub" id="uploadSub">🖼️ JPG / PNG · max 5 files</span>
                    <input type="file" id="fileInput" accept="image/*" multiple />
                </label>
                <div class="file-name" id="fileName"></div>
            </div>
        </section>

        <!-- Body grid -->
        <section class="body-grid">
            <div class="panel">
                <div class="panel-header">
                    <span class="title" id="resultTitle">🖼️ Upscaled result</span>
                    <span class="chip" id="resultInfo">⏳ Waiting…</span>
                </div>
                <div id="resultGrid" class="result-grid"></div>
                <div class="log" id="log">📥 업로드를 기다리는 중입니다.</div>
            </div>
        </section>
    </div>
</div>

<script>
    const TARGET_SIZE = 250 * 1024; // 250KB
    const MAX_FILES = 5;
    const CROP_RATIO = 1537 / 2370;

    const fileInput = document.getElementById('fileInput');
    const fileNameEl = document.getElementById('fileName');
    const logEl = document.getElementById('log');
    const resultGrid = document.getElementById('resultGrid');
    const resultInfo = document.getElementById('resultInfo');
    const pageSubtitleEl = document.getElementById('pageSubtitle');
    const targetLabelEl = document.getElementById('targetLabel');
    const targetValueEl = document.getElementById('targetValue');
    const uploadSubEl = document.getElementById('uploadSub');
    const resultTitleEl = document.getElementById('resultTitle');
    const modeButtons = Array.from(document.querySelectorAll('.mode-button'));

    let activeBatchId = 0;
    let currentMode = 'allInOne';
    let resultUrls = [];

    const MODES = {
        upscale: {
            subtitle: '이미지를 업로드하면 <b>250KB 이상</b>의 새 이미지 파일로 만들어 줍니다.',
            targetLabel: '🎯 Target size',
            targetValue: '≥ 250KB',
            uploadSub: '🖼️ JPG / PNG · max 5 files',
            resultTitle: '🖼️ Upscaled result',
            emptyState: '',
            preparingState: '🖼️ 이미지를 준비 중입니다...',
            waitingLog: '📥 업로드를 기다리는 중입니다.',
            ignoredStartLog: `🚀 최대 ${MAX_FILES}장까지 처리할 수 있어 앞의 ${MAX_FILES}장만 자동 업스케일합니다.`,
            startLog(count) {
                return `🚀 ${count}개 이미지 업로드 감지. 자동 업스케일을 시작합니다.`;
            },
            batchHeader(ignoredCount) {
                return ignoredCount > 0
                    ? `🚀 최대 ${MAX_FILES}장 기준으로 자동 업스케일 중`
                    : '🚀 자동 업스케일 진행 중';
            },
            processingPlaceholder: '🚀 업스케일 처리 중...',
            buildDownloadName(file) {
                return buildDownloadName('upscaled', file);
            },
            async processFile(file, onProgress) {
                const blob = await makeAtLeastSize(file, TARGET_SIZE, onProgress);

                return {
                    blob,
                    statusText: formatKB(blob.size),
                    completeMessage: `✅ 변환 완료 (${formatKB(blob.size)})`
                };
            }
        },
        crop: {
            subtitle: '이미지를 업로드하면 <b>1537x2370 비율</b>로 자동 크롭합니다. 세로는 유지하고 가로 좌우만 잘라 맞춥니다.',
            targetLabel: '✂️ Target ratio',
            targetValue: '1537:2370',
            uploadSub: '🖼️ JPG / PNG · max 5 files',
            resultTitle: '✂️ Cropped result',
            emptyState: '',
            preparingState: '🖼️ 크롭할 이미지를 준비 중입니다...',
            waitingLog: '📥 업로드를 기다리는 중입니다.',
            ignoredStartLog: `✂️ 최대 ${MAX_FILES}장까지 처리할 수 있어 앞의 ${MAX_FILES}장만 자동 크롭합니다.`,
            startLog(count) {
                return `✂️ ${count}개 이미지 업로드 감지. 자동 크롭을 시작합니다.`;
            },
            batchHeader(ignoredCount) {
                return ignoredCount > 0
                    ? `✂️ 최대 ${MAX_FILES}장 기준으로 자동 크롭 중`
                    : '✂️ 1537:2370 자동 크롭 진행 중';
            },
            processingPlaceholder: '✂️ 좌우 크롭 처리 중...',
            buildDownloadName(file) {
                return buildDownloadName('cropped-1537x2370', file);
            },
            async processFile(file, onProgress) {
                const result = await cropToTargetRatio(file, CROP_RATIO, onProgress);

                return {
                    blob: result.blob,
                    statusText: `${result.width}x${result.height}`,
                    completeMessage: `✅ 크롭 완료 (${result.width}x${result.height})`
                };
            }
        },
        allInOne: {
            subtitle: '업로드한 이미지를 먼저 <b>1537x2370 비율</b>로 좌우 크롭한 뒤, 이어서 <b>250KB 이상</b>이 되도록 자동 업스케일합니다.',
            targetLabel: '🪄 Target flow',
            targetValue: '1537:2370 + ≥ 250KB',
            uploadSub: '🖼️ JPG / PNG · max 5 files',
            resultTitle: '🪄 All-in-One result',
            emptyState: '',
            preparingState: '🖼️ 올인원 처리할 이미지를 준비 중입니다...',
            waitingLog: '📥 업로드를 기다리는 중입니다.',
            ignoredStartLog: `🪄 최대 ${MAX_FILES}장까지 처리할 수 있어 앞의 ${MAX_FILES}장만 올인원 처리합니다.`,
            startLog(count) {
                return `🪄 ${count}개 이미지 업로드 감지. 자동 크롭 + 업스케일을 시작합니다.`;
            },
            batchHeader(ignoredCount) {
                return ignoredCount > 0
                    ? `🪄 최대 ${MAX_FILES}장 기준으로 올인원 처리 중`
                    : '🪄 1537:2370 크롭 후 자동 업스케일 진행 중';
            },
            processingPlaceholder: '🪄 크롭 후 업스케일 처리 중...',
            buildDownloadName(file) {
                return buildDownloadName('all-in-one', file);
            },
            async processFile(file, onProgress) {
                const cropped = await cropToTargetRatio(file, CROP_RATIO, (message) => {
                    onProgress(`✂️ [1/2 크롭] ${message}`);
                });
                const blob = await makeAtLeastSize(cropped.blob, TARGET_SIZE, (message) => {
                    onProgress(`🚀 [2/2 업스케일] ${message}`);
                });

                return {
                    blob,
                    statusText: `${cropped.width}x${cropped.height} · ${formatKB(blob.size)}`,
                    completeMessage: `✅ 크롭 + 업스케일 완료 (${cropped.width}x${cropped.height}, ${formatKB(blob.size)})`
                };
            }
        }
    };

    modeButtons.forEach((button) => {
        button.addEventListener('click', () => {
            setMode(button.dataset.mode);
        });
    });

    fileInput.addEventListener('change', async (e) => {
        const mode = MODES[currentMode];
        const selectedFiles = Array.from(e.target.files || [])
            .filter((file) => file.type.startsWith('image/'));
        fileInput.value = '';

        if (!selectedFiles.length) return;

        const files = selectedFiles.slice(0, MAX_FILES);
        const ignoredCount = selectedFiles.length - files.length;

        fileNameEl.textContent = buildSelectionSummary(files, ignoredCount);
        resultInfo.textContent = '⏳ Preparing…';
        renderEmptyState(mode.preparingState);
        logEl.textContent = ignoredCount > 0
            ? mode.ignoredStartLog
            : mode.startLog(files.length);

        await processFiles(files, mode, ignoredCount);
    });

    function formatKB(bytes) {
        return `${(bytes / 1024).toFixed(1)} KB`;
    }

    function buildSelectionSummary(files, ignoredCount) {
        const names = files.map((file) => file.name).join(', ');
        const base = `${files.length}개 선택됨: ${names}`;

        return ignoredCount > 0
            ? `${base} · 추가 ${ignoredCount}개는 제외됨`
            : base;
    }

    function buildDownloadName(prefix, file) {
        const baseName = (file.name || 'image').replace(/\.[^.]+$/, '');
        return `${prefix}-${baseName}.jpg`;
    }

    function clearResultUrls() {
        resultUrls.forEach((url) => URL.revokeObjectURL(url));
        resultUrls = [];
    }

    function setMode(modeKey) {
        if (!MODES[modeKey] || modeKey === currentMode) return;

        currentMode = modeKey;
        activeBatchId += 1;
        fileNameEl.textContent = '';
        resultInfo.textContent = '⏳ Waiting…';

        applyModeCopy();
        renderEmptyState(MODES[currentMode].emptyState);
        logEl.textContent = MODES[currentMode].waitingLog;
    }

    function applyModeCopy() {
        const mode = MODES[currentMode];

        pageSubtitleEl.innerHTML = mode.subtitle;
        targetLabelEl.textContent = mode.targetLabel;
        targetValueEl.textContent = mode.targetValue;
        uploadSubEl.textContent = mode.uploadSub;
        resultTitleEl.textContent = mode.resultTitle;

        modeButtons.forEach((button) => {
            button.classList.toggle('is-active', button.dataset.mode === currentMode);
        });
    }

    function renderEmptyState(message) {
        clearResultUrls();
        resultGrid.innerHTML = '';

        if (!message) return;

        const placeholder = document.createElement('div');
        placeholder.className = 'preview-placeholder';
        placeholder.textContent = message;
        resultGrid.appendChild(placeholder);
    }

    function createResultCard(file, index) {
        const card = document.createElement('div');
        card.className = 'result-card';

        const meta = document.createElement('div');
        meta.className = 'result-meta';

        const nameWrap = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'result-name';
        name.textContent = `${index + 1}. ${file.name}`;

        const sourceInfo = document.createElement('div');
        sourceInfo.className = 'result-source';
        sourceInfo.textContent = `원본 파일 크기 ${formatKB(file.size)}`;

        nameWrap.append(name, sourceInfo);

        const status = document.createElement('span');
        status.className = 'result-status';
        status.textContent = '⏳ 대기';

        meta.append(nameWrap, status);

        const preview = document.createElement('div');
        preview.className = 'result-preview';

        const image = document.createElement('img');
        image.className = 'preview-img';
        image.alt = `${file.name} upscaled preview`;
        image.style.display = 'none';

        const placeholder = document.createElement('div');
        placeholder.className = 'preview-placeholder';
        placeholder.textContent = '✨ 처리 준비 중...';

        preview.append(image, placeholder);

        const actions = document.createElement('div');
        actions.className = 'result-actions';

        const download = document.createElement('a');
        download.className = 'btn btn-secondary';
        download.href = '#';
        download.style.display = 'none';
        download.textContent = '⬇️ 결과 다운로드';

        actions.appendChild(download);
        card.append(meta, preview, actions);

        return { card, status, image, placeholder, download };
    }

    async function processFiles(files, mode, ignoredCount = 0) {
        const batchId = ++activeBatchId;
        clearResultUrls();
        resultGrid.innerHTML = '';

        const cards = files.map((file, index) => {
            const card = createResultCard(file, index);
            resultGrid.appendChild(card.card);
            return card;
        });

        let successCount = 0;

        for (let index = 0; index < files.length; index++) {
            if (batchId !== activeBatchId) return;

            const file = files[index];
            const card = cards[index];

            card.status.textContent = '⚙️ 처리 중...';
            card.placeholder.textContent = mode.processingPlaceholder;
            resultInfo.textContent = `✅ ${successCount} / ${files.length} 완료`;

            const prefix = `${index + 1}/${files.length} · ${file.name}`;
            const batchHeader = mode.batchHeader(ignoredCount);

            try {
                const result = await mode.processFile(file, (message) => {
                    if (batchId !== activeBatchId) return;
                    logEl.textContent = `${batchHeader}\n${prefix}\n${message}`;
                });

                if (batchId !== activeBatchId) return;

                const resultUrl = URL.createObjectURL(result.blob);
                resultUrls.push(resultUrl);

                card.image.src = resultUrl;
                card.image.style.display = 'block';
                card.placeholder.style.display = 'none';

                card.download.href = resultUrl;
                card.download.download = mode.buildDownloadName(file);
                card.download.style.display = 'inline-flex';

                card.status.textContent = result.statusText;
                successCount += 1;
                resultInfo.textContent = `✅ ${successCount} / ${files.length} 완료`;
                logEl.textContent = `${batchHeader}\n${prefix}\n${result.completeMessage}`;
            } catch (err) {
                console.error(err);
                card.status.textContent = '❌ 실패';
                card.placeholder.textContent = '❌ 변환 실패';
                logEl.textContent = `⚠️ ${prefix}\n에러 발생: ${err.message}`;
            }
        }

        if (batchId !== activeBatchId) return;

        logEl.textContent = successCount === files.length
            ? `🎉 총 ${files.length}개 이미지 변환 완료`
            : `🎉 총 ${successCount}/${files.length}개 이미지 변환 완료`;
        resultInfo.textContent = `✅ ${successCount} / ${files.length} 완료`;
    }

    function loadImageFromFile(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const objectUrl = URL.createObjectURL(file);

            img.onload = () => {
                URL.revokeObjectURL(objectUrl);
                resolve(img);
            };
            img.onerror = () => {
                URL.revokeObjectURL(objectUrl);
                reject(new Error('이미지를 불러오지 못했습니다.'));
            };
            img.src = objectUrl;
        });
    }

    function canvasEncode(img, width, height, quality = 0.9) {
        return new Promise((resolve, reject) => {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob(
                (blob) => {
                    if (!blob) return reject(new Error('Blob 생성 실패'));
                    resolve(blob);
                },
                'image/jpeg',
                quality
            );
        });
    }

    function canvasCropEncode(img, sourceX, sourceY, sourceWidth, sourceHeight, outputWidth, outputHeight, quality = 0.95) {
        return new Promise((resolve, reject) => {
            const canvas = document.createElement('canvas');
            canvas.width = outputWidth;
            canvas.height = outputHeight;
            const ctx = canvas.getContext('2d');

            ctx.drawImage(
                img,
                sourceX,
                sourceY,
                sourceWidth,
                sourceHeight,
                0,
                0,
                outputWidth,
                outputHeight
            );

            canvas.toBlob(
                (blob) => {
                    if (!blob) return reject(new Error('Blob 생성 실패'));
                    resolve(blob);
                },
                'image/jpeg',
                quality
            );
        });
    }

    async function makeAtLeastSize(file, targetBytes, onProgress = () => {}) {
        const img = await loadImageFromFile(file);

        let scale = 1;
        let blob = await canvasEncode(img, img.width, img.height, 0.9);
        onProgress(`🧪 초기 인코딩: ${formatKB(blob.size)}`);

        // 안전장치: 최대 6번 정도만 시도
        for (let i = 0; i < 6 && blob.size < targetBytes; i++) {
            const factor = Math.sqrt(targetBytes / blob.size) * 1.1; // 여유 있게 약간 더
            scale *= factor;

            const newW = Math.round(img.width * scale);
            const newH = Math.round(img.height * scale);

            blob = await canvasEncode(img, newW, newH, 0.9);
            onProgress(`🔁 [시도 ${i + 1}] ${newW}x${newH} → ${formatKB(blob.size)}`);
        }

        if (blob.size < targetBytes) {
            onProgress('⚠️ 여러 번 시도했지만 250KB에 살짝 못 미칠 수 있습니다.');
        }

        return blob;
    }

    async function cropToTargetRatio(file, targetRatio, onProgress = () => {}) {
        const img = await loadImageFromFile(file);
        const targetWidth = Math.round(img.height * targetRatio);

        onProgress(`📐 원본 크기: ${img.width}x${img.height}`);

        if (img.width < targetWidth) {
            throw new Error('이미지 가로폭이 목표 비율보다 좁아서 좌우 크롭만으로는 만들 수 없습니다.');
        }

        const totalCrop = img.width - targetWidth;
        const cropLeft = Math.floor(totalCrop / 2);
        const cropRight = totalCrop - cropLeft;

        if (totalCrop === 0) {
            onProgress('✨ 이미 1537:2370 비율입니다. 세로는 그대로 유지한 채 다시 저장합니다.');
        } else {
            onProgress(`✂️ 세로 ${img.height}px는 유지하고, 좌 ${cropLeft}px / 우 ${cropRight}px씩 잘라 ${targetWidth}x${img.height}로 맞춥니다.`);
        }

        const blob = await canvasCropEncode(
            img,
            cropLeft,
            0,
            targetWidth,
            img.height,
            targetWidth,
            img.height,
            0.95
        );

        return {
            blob,
            width: targetWidth,
            height: img.height
        };
    }

    applyModeCopy();
    renderEmptyState(MODES[currentMode].emptyState);
    logEl.textContent = MODES[currentMode].waitingLog;
</script>
